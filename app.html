  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <div id="share-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <p class="title">シェア</p>
        <span id="share-modal-close" class="close-button">&times;</span>
      </div>
      <img src="qrcode.png" alt="QR Code">
    </div>
  </div>
  <div id="setting-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <p class="title">出題設定</p>
        <span id="setting-modal-close" class="close-button">&times;</span>
        
      </div>
      
      <div class="setting-card-top">
        <span id="setting-subject" class="badge t0">不明</span>
        <span id="setting-grade" class="badge t0">不明</span>
        <span id="setting-count" class="badge t0">
        <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <rect x="3" y="1" width="11" height="8" rx="1.4" opacity="0.45"></rect>
  <rect x="1.5" y="4" width="11" height="8" rx="1.4" opacity="0.7"></rect>
  <rect x="0" y="7" width="11" height="8" rx="1.4"></rect>
          </svg><span id="setting-count-text">--</span></span>
        </div>
      <div class="card-info-area">
        <p id="setting-title">loading...</p>
        <p id="setting-description">loading...</p>
        <p id="setting-madeBy-p">作成者: <span id="setting-madeBy-name" class="">loading...</span></p>
      </div>
      <div class="buttons-area">
        <button id="edit-button" disabled>編集</button>
        <button id="start-button">スタート</button>
      </div>
    </div>
  </div>
  
  <div id="drawerOverlay" class="drawer-overlay"></div>
  <div id="accountSettingsDrawer" class="drawer">
    <div class="drawer-header">
      <p>アカウント設定</p>
      <span id="drawerCloseButton" class="drawer-close-button">&times;</span>
    </div>
    <div class="drawer-content">
      <div class="drawer-section">
        <p class="title">現在のユーザー</p>
        <p>ID: <strong id="drawerUserId">取得中...</strong><span></span></p>
        
        <button id="logout-button" class="logout-button normal-button">ログアウト</button>
      </div>
      <div class="drawer-section">
        <p class="title">ユーザーネーム</p>
        <p>現在の名前: <strong id="drawerUsername">取得中...</strong></p>
        <input type="text" id="newUsernameInput" placeholder="新しい名前">
        <button id="changeUsernameButton" class="normal-button" disabled="true">名前を変更</button>
        <p id="username-message"></p>
      </div>
    </div>
</div>
  
  
  <header id="app-header">
    <div id="title-area">
      <p id="header-title">問題投稿</p>
      <button id="share-modal-btn">シェア</button>
    </div>
    
    <div id="user-data">
     <!--<p id="header-username">取得中...</p>-->
      <button id="setting-button">アカウント情報</button>
    </div>
  </header>
