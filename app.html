<html lang="ja">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>問題投稿</title>
  <meta name="apple-mobile-web-app-capable" content="yes"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Signika+Negative:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="appStyle.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
  
<body>
  <div id="share-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <p class="title">シェア</p>
        <span id="share-modal-close" class="close-button">&times;</span>
      </div>
      <img src="qrcode.png" alt="QR Code">
    </div>
  </div>
  <div id="setting-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <p class="title">出題設定</p>
        <span id="setting-modal-close" class="close-button">&times;</span>
        
      </div>
      
      <div class="setting-card-top">
        <span id="setting-subject" class="badge t0">不明</span>
        <span id="setting-grade" class="badge t0">不明</span>
        <span id="setting-count" class="badge t0">
        <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
  <rect x="3" y="1" width="11" height="8" rx="1.4" opacity="0.45"></rect>
  <rect x="1.5" y="4" width="11" height="8" rx="1.4" opacity="0.7"></rect>
  <rect x="0" y="7" width="11" height="8" rx="1.4"></rect>
          </svg><span id="setting-count-text">--</span></span>
        </div>
      <div class="card-info-area">
        <p id="setting-title">loading...</p>
        <p id="setting-description">loading...</p>
        <p id="setting-madeBy-p">作成者: <span id="setting-madeBy-name" class="clickable-user">loading...</span></p>
      </div>
      <div class="buttons-area">
        <button id="edit-button" disabled>編集</button>
        <button id="start-button">スタート</button>
      </div>
    </div>
  </div>
  
  <div id="solved-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <p class="title">解いた人</p>
        <span id="solved-modal-close" class="close-button">&times;</span>
      </div>
      <div id="solved-area"></div>
    </div>
  </div>

  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <p class="title">プロフィール</p>
        <span id="profile-modal-close" class="close-button">&times;</span>
      </div>
      <div id="profile-area">
        <div class="profile-avatar-wrap">
          <div id="profile-avatar-holder"></div>
        </div>

        <p id="profile-name">取得中...</p>
        <input id="profile-name-input" class="hidden" type="text" placeholder="ユーザーネーム">

        <p class="profile-label">ステータスメッセージ</p>
        <div id="profile-text">取得中...</div>
        <textarea id="profile-text-edit" class="hidden" placeholder="自己紹介を入力してください"></textarea>

        <button id="profile-edit-button" class="hidden">プロフィールを編集</button>
      </div>
    </div>
  </div>

  <div id="drawerOverlay" class="drawer-overlay"></div>
  <div id="accountSettingsDrawer" class="drawer">
    <div class="drawer-header">
      <p>アカウント設定</p>
      <span id="drawerCloseButton" class="drawer-close-button">&times;</span>
    </div>
    <div class="drawer-content">
      <div class="drawer-section">
        <p class="title">現在のユーザー</p>
        <p>ID: <strong id="drawerUserId">取得中...</strong><span></span></p>
        <p>ユーザーネーム: <strong id="drawerUsername">取得中...</strong></p>

        <button id="drawer-edit-profile-button" class="normal-button" style="margin-bottom: 1rem;">プロフィールを編集</button>
        <button id="logout-button" class="logout-button normal-button">ログアウト</button>
      </div>
    </div>
</div>
  
  
  <header id="app-header">
    <div id="title-area">
      <p id="header-title">問題投稿</p>
      <button id="share-modal-btn">シェア</button>
    </div>
    
    <div id="user-data">
     <!--<p id="header-username">取得中...</p>-->
      <button id="setting-button">アカウント情報</button>
    </div>
  </header>
  
  
  <main>
    <div class="books-container">
      <p class="title">問題集一覧</p>
      <div class="narrow-down-area">
        <p>絞り込み</p>
        <select id="subject-select">
          <option value="all">すべて</option>
          <option value="1">国語</option>
          <option value="2">数学</option>
          <option value="3">理科</option>
          <option value="4">英語</option>
          <option value="5">社会(歴史)</option>
          <option value="6">社会(地理)</option>
          <option value="7">社会(公民)</option>
          <option value="8">保健体育(保健)</option>
          <option value="9">保健体育(実技)</option>
        </select>
        <select id="grade-select">
          <option value="all">すべて</option>
          <option value="1">1年</option>
          <option value="2">2年</option>
          <option value="3">3年</option>
          <option value="4">総合</option>
        </select>
      </div>
      
      <p id="loading-text">読み込み中...</p>
      <div id="card-area" class="card-area hidden">
      </div>
    </div>
  </main>
  
  
  
  <script type="module" src="appScript.js"></script>
</html>
