<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>問題集を編集</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="editStyle.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <div id="loading-overlay" class="">
    <h1>loading...</h1>
    <p>読み込んでいます｡</p>
  </div>

  <div id="no-permission-overlay" class="hidden">
    <h1>編集できません</h1>
    <p>この問題集を編集する権限がありません。</p>
    <button id="no-permission-home-button" class="answer-next-button">ホームにもどる</button>
  </div>

  <header id="app-header">
    <div id="title-area">
      <a href="./app.html" id="back-button" aria-label="一覧に戻る">&larr;</a>
      <p id="header-title">問題集を編集</p>
    </div>
  </header>

  <main>
    <div class="make-container">

      <section class="make-section">
        <p class="make-section-title">基本情報</p>

        <label class="make-label" for="book-title-input">タイトル</label>
        <input type="text" id="book-title-input" placeholder="例: 近世の日本" maxlength="60">

        <label class="make-label" for="book-description-input">説明</label>
        <textarea id="book-description-input" placeholder="どんな問題集か説明を書きましょう" maxlength="200"></textarea>

        <div class="make-inline-fields">
          <div class="make-inline-field">
            <label class="make-label" for="book-subject-select">教科</label>
            <select id="book-subject-select">
              <option value="0">不明</option>
              <option value="1">国語</option>
              <option value="2">数学</option>
              <option value="3">理科</option>
              <option value="4">英語</option>
              <option value="5">社会(歴史)</option>
              <option value="6">社会(地理)</option>
              <option value="7">社会(公民)</option>
              <option value="8">保健体育(保健)</option>
              <option value="9">保健体育(実技)</option>
            </select>
          </div>
          <div class="make-inline-field">
            <label class="make-label" for="book-grade-select">学年</label>
            <select id="book-grade-select">
              <option value="0">不明</option>
              <option value="1">1年</option>
              <option value="2">2年</option>
              <option value="3">3年</option>
              <option value="4">総合</option>
            </select>
          </div>
        </div>
      </section>

      <section class="make-section">
        <div class="make-section-header">
          <p class="make-section-title">問題</p>
        </div>

        <div id="problems-list"></div>

        <button id="add-problem-button" type="button" class="add-button">＋ 問題を追加</button>
      </section>

      <button id="submit-button" type="button" class="submit-button">この内容で更新する</button>
      <button id="delete-book-button" type="button" class="delete-button">この問題集を削除する</button>
    </div>
  </main>

  <template id="problem-template">
    <div class="problem-card">
      <div class="problem-card-header">
        <p class="problem-card-title"></p>
        <button type="button" class="remove-problem-button" aria-label="この問題を削除">&times;</button>
      </div>

      <label class="make-label">問題文</label>
      <textarea class="problem-text-input" placeholder="問題文を入力"></textarea>

      <label class="make-label">画像（任意）</label>
      <div class="problem-image-area">
        <div class="problem-image-preview-wrap hidden">
          <img class="problem-image-preview" alt="プレビュー画像">
          <button type="button" class="remove-image-button">画像を削除</button>
        </div>
        <button type="button" class="select-image-button">＋ 画像を選択</button>
        <input type="file" class="image-file-input hidden" accept="image/*">
      </div>

      <label class="make-label">選択肢（正解にはチェックを入れてください）</label>
      <div class="choices-list"></div>
      <button type="button" class="add-choice-button">＋ 選択肢を追加</button>

      <label class="make-label">解説（任意）</label>
      <textarea class="explanation-input" placeholder="正解の理由などを書きましょう（省略可）"></textarea>
    </div>
  </template>

  <template id="choice-template">
    <div class="choice-row">
      <label class="choice-correct-label">
        <input type="checkbox" class="choice-correct-checkbox">
        <span>正解</span>
      </label>
      <input type="text" class="choice-text-input" placeholder="選択肢を入力">
      <button type="button" class="remove-choice-button" aria-label="この選択肢を削除">&times;</button>
    </div>
  </template>

  <script src="editScript.js"></script>
</body>
</html>
